<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>War GIS System</title>

  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
</head>

<body>

<div id="map"></div>

<div id="ui-root">

  <div id="panel">
    <h3>Style Editor</h3>
  </div>

</div>

<!-- 🟢 功能区（可折叠） -->
<div id="sidebar" class="expanded">

  <div id="sidebar-mini" onclick="toggleSidebar()">
    ⚔
  </div>

  <div id="sidebar-body">

    <button onclick="setArrowMode('line')">Line</button>
    <button onclick="setArrowMode('dashed')">Dashed</button>
    <button onclick="setArrowMode('arc')">Arc</button>

    <hr/>

    <p>Drag on map</p>

  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script src="js/colors.js"></script>
<script src="js/map.js"></script>
<script src="js/arrow.js"></script>
<script src="js/draw.js"></script>
<script src="js/ui.js"></script>

<script src="app.js"></script>

</body>
</html>
