<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GIS War Map</title>

  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body>

<div id="map"></div>

<div id="ui-root">

  <div id="panel">
    <h3>Style Editor</h3>
  </div>

</div>

<!-- 🟢 左下工具栏 -->
<div id="sidebar" class="expanded">

  <div id="sidebar-mini" onclick="toggleSidebar()">⚔</div>

  <div id="sidebar-body">

    <button onclick="setArrowMode('line')">Line</button>
    <button onclick="setArrowMode('dashed')">Dashed</button>
    <button onclick="setArrowMode('arc')">Arc</button>

    <hr/>

    <!-- 🆕 标注 -->
    <button onclick="enableLabelMode()">Label</button>

    <!-- 🆕 KML -->
    <input type="file" id="kmlInput" accept=".kml" />

  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="js/map.js"></script>
<script src="js/kml.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
