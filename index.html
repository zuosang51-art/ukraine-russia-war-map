<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>War GIS System</title>

<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

</head>

<body>

<div id="map"></div>

<div id="ui-root">

  <div id="panel">
    <h3>Style Editor</h3>
    <input type="color" id="colorPicker"/>
    <input type="range" id="opacity" min="0" max="1" step="0.1"/>
  </div>

</div>

<div id="toolbar">
  <button onclick="toggleTool()">☰</button>
  <button onclick="setDraw('line')">线</button>
  <button onclick="setDraw('dash')">虚线</button>
  <button onclick="setDraw('arc')">弧线</button>
  <button onclick="setDraw('arrow')">箭头</button>
  <button onclick="loadKML()">KML</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script src="gis-core.js"></script>
<script src="draw.js"></script>
<script src="arrow.js"></script>
<script src="kml.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

</body>
</html>
