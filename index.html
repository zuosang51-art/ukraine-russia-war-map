<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GIS War Map</title>

<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body>

<div id="map"></div>

<div id="ui-root">
  <div id="panel">Style Editor</div>
</div>

<div id="sidebar">
  <div id="sidebar-mini" onclick="toggleSidebar()">⚔</div>
  <div id="sidebar-body">

    <button onclick="setArrowMode('line')">Line</button>
    <button onclick="setArrowMode('dashed')">Dashed</button>
    <button onclick="setArrowMode('arc')">Arc</button>

    <hr/>

    <button onclick="loadKML('./kml/frontline.kml')">Load KML</button>

  </div>
</div>

<!-- ===================== -->
<!-- 🧠 关键加载顺序 -->
<!-- ===================== -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="js/bootstrap.js"></script>

<script src="js/map.js"></script>
<script src="js/draw.js"></script>
<script src="js/arrow.js"></script>
<script src="js/kml.js"></script>
<script src="js/ui.js"></script>

<script src="js/app.js"></script>

</body>
</html>
