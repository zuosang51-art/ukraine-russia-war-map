<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GIS War Map</title>

  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body>

<div id="map"></div>

<div id="ui-root">

  <div id="panel">
    <h3>Style Editor</h3>
  </div>

</div>

<!-- 🟢 左下工具栏 -->
<div id="sidebar" class="expanded">

  <div id="sidebar-mini" onclick="toggleSidebar()">⚔</div>

  <div id="sidebar-body">

    <button onclick="setArrowMode('line')">Line</button>
    <button onclick="setArrowMode('dashed')">Dashed</button>
    <button onclick="setArrowMode('arc')">Arc</button>

    <hr/>

    <button onclick="loadKML('./kml/frontline.kml')">Load KML</button>

    <p style="font-size:12px;">GitHub KML Loader</p>

  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="js/map.js"></script>
<script src="js/kml.js"></script>
<script src="js/draw.js"></script>
<script src="js/arrow.js"></script>
<script src="js/ui.js"></script>

<script src="app.js"></script>

</body>
</html>
