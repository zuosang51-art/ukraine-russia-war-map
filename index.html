<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>War GIS V3 Ultimate</title>

<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;background:black;}
#map{height:100%;width:100%;}

#ui{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}

#panel{
  position:absolute;
  right:10px;
  top:80px;
  width:260px;
  background:#000a;
  border:1px solid #0ff;
  color:#0ff;
  padding:10px;
  pointer-events:auto;
}

#toolbar{
  position:fixed;
  left:10px;
  bottom:10px;
  background:#000a;
  border:1px solid #0ff;
  padding:6px;
  z-index:9999;
}

button{display:block;margin:4px;width:150px;}
</style>

</head>

<body>

<div id="map"></div>

<div id="ui">

  <div id="panel">
    <h3>War Control</h3>
    <button onclick="setMode('line')">Line</button>
    <button onclick="setMode('dash')">Dash</button>
    <button onclick="setMode('arc')">Arc</button>
    <button onclick="setMode('arrow')">Arrow</button>
    <button onclick="toggleAnim()">Play/Pause</button>
  </div>

  <div id="toolbar">
    <button onclick="clearAll()">Clear</button>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="core.js"></script>
<script src="map.js"></script>
<script src="warline.js"></script>
<script src="arrow.js"></script>
<script src="animation.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>
<script src="frontline.js"></script>

</body>
</html>
